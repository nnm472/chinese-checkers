<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>中国のチェッカー</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="app-header">
        <div class="app-title">
          <p class="eyebrow">Offline Duel</p>
          <h1>中国のチェッカー</h1>
        </div>
        <div class="header-actions">
          <button class="ghost-button header-help" id="helpButton" type="button">ヘルプ</button>
          <button class="icon-button" id="pauseButton" type="button" aria-label="設定" title="設定">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </header>

      <main class="game-shell" aria-label="対戦画面">
        <section class="player-panel player-panel--green facing-green" aria-label="緑チーム">
          <div class="player-main">
            <span class="team-dot team-dot--green"></span>
            <span class="player-name">緑</span>
          </div>
          <div class="turn-summary">
            <span id="greenTurnLabel">緑の手番</span>
            <span id="greenStatusLabel">待機中</span>
          </div>
          <div class="player-meta">
            <span>残り</span>
            <span class="piece-count" id="greenCount">16</span>
          </div>
        </section>

        <section class="skill-row skill-row--top facing-green" aria-label="緑チームのスキル">
          <button class="skill-button" type="button" data-team="green" data-skill="power">
            <span class="skill-fill"></span>
            <span class="skill-label">Power</span>
          </button>
          <button class="skill-button" type="button" data-team="green" data-skill="rest">
            <span class="skill-fill"></span>
            <span class="skill-label">Skip</span>
          </button>
          <button class="skill-button" type="button" data-team="green" data-skill="grow">
            <span class="skill-fill"></span>
            <span class="skill-label">Grow</span>
          </button>
          <button class="skill-button" type="button" data-team="green" data-skill="steal">
            <span class="skill-fill"></span>
            <span class="skill-label">Steal</span>
          </button>
        </section>

        <div class="board-frame">
          <canvas id="gameCanvas" width="1000" height="1292" aria-label="ゲーム盤"></canvas>
        </div>

        <section class="skill-row skill-row--bottom" aria-label="赤チームのスキル">
          <button class="skill-button" type="button" data-team="red" data-skill="power">
            <span class="skill-fill"></span>
            <span class="skill-label">Power</span>
          </button>
          <button class="skill-button" type="button" data-team="red" data-skill="rest">
            <span class="skill-fill"></span>
            <span class="skill-label">Skip</span>
          </button>
          <button class="skill-button" type="button" data-team="red" data-skill="grow">
            <span class="skill-fill"></span>
            <span class="skill-label">Grow</span>
          </button>
          <button class="skill-button" type="button" data-team="red" data-skill="steal">
            <span class="skill-fill"></span>
            <span class="skill-label">Steal</span>
          </button>
        </section>

        <section class="player-panel player-panel--red" aria-label="赤チーム">
          <div class="player-main">
            <span class="team-dot team-dot--red"></span>
            <span class="player-name">赤</span>
          </div>
          <div class="turn-summary">
            <span id="redTurnLabel">赤の手番</span>
            <span id="redStatusLabel">コマを選択</span>
          </div>
          <div class="player-meta">
            <span>残り</span>
            <span class="piece-count" id="redCount">16</span>
          </div>
        </section>
      </main>
    </div>

    <section class="screen" id="titleScreen" aria-label="タイトル画面">
      <div class="screen-card screen-card--title">
        <p class="eyebrow">Flick Board Game</p>
        <h2>中国のチェッカー</h2>
        <p class="screen-copy">引いて、弾いて、盤外へ。</p>
        <div class="screen-actions">
          <button class="primary-button" id="singleStartButton" type="button">1人プレイ</button>
          <button class="primary-button" id="twoPlayerStartButton" type="button">2人対戦</button>
          <button class="secondary-button" id="tutorialButton" type="button">チュートリアル</button>
        </div>
      </div>
    </section>

    <section class="screen hidden" id="tutorialScreen" aria-label="チュートリアル">
      <div class="screen-card">
        <div class="tutorial-art" id="tutorialArt"></div>
        <p class="eyebrow" id="tutorialStep">1 / 4</p>
        <h2 id="tutorialTitle">操作</h2>
        <p class="screen-copy" id="tutorialText"></p>
        <div class="screen-actions screen-actions--split">
          <button class="secondary-button" id="tutorialBackButton" type="button">戻る</button>
          <button class="primary-button" id="tutorialNextButton" type="button">次へ</button>
        </div>
      </div>
    </section>

    <section class="screen hidden" id="pauseScreen" aria-label="設定">
      <div class="screen-card">
        <p class="eyebrow">Settings</p>
        <h2>設定</h2>
        <div class="settings-list">
          <label class="setting-line">
            <span>効果音</span>
            <input id="soundToggle" type="checkbox" checked />
          </label>
        </div>
        <div class="screen-actions">
          <button class="primary-button" id="resumeButton" type="button">再開</button>
          <button class="secondary-button" id="pauseRestartButton" type="button">最初から</button>
          <button class="secondary-button" id="backToTitleButton" type="button">タイトルへ</button>
        </div>
      </div>
    </section>

    <section class="screen hidden" id="resultScreen" aria-label="結果">
      <div class="screen-card">
        <p class="eyebrow">Result</p>
        <h2 id="winnerTitle">赤の勝利</h2>
        <p class="screen-copy" id="winnerText"></p>
        <div class="screen-actions">
          <button class="primary-button" id="rematchButton" type="button">再戦</button>
          <button class="secondary-button" id="resultTitleButton" type="button">タイトルへ</button>
        </div>
      </div>
    </section>

    <div class="skill-announcement hidden" id="skillAnnouncement" aria-live="polite">
      <div class="skill-announcement__icon" id="skillAnnouncementIcon">Power</div>
      <div>
        <p class="skill-announcement__team" id="skillAnnouncementTeam">赤</p>
        <p class="skill-announcement__text" id="skillAnnouncementText">このターン、威力が50%アップ</p>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
